<div class="container py-4">

  <div class="row">

    <!-- LEFT SIDE FORM -->
    <div class="col-md-4">

      <h4>Customize Card</h4>

      <input class="form-control mb-2"
             placeholder="Name"
             [(ngModel)]="userData.name">

      <input class="form-control mb-2"
             placeholder="Role"
             [(ngModel)]="userData.role">

      <input class="form-control mb-2"
             placeholder="Phone"
             [(ngModel)]="userData.phone">

      <input class="form-control mb-2"
             placeholder="Email"
             [(ngModel)]="userData.email">

             <input type="file"
       class="form-control mb-2"   (change)="onImageSelect($event)">

    </div>


    <!-- RIGHT SIDE PREVIEW -->
    <div class="col-md-8 d-flex justify-content-center">

      <app-card-preview
        [template]="templateType"
        [user]="userData">
      </app-card-preview>

    </div>

  </div>

</div>
